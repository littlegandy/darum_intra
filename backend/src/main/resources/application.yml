spring:
  application:
    name: intra-v2-backend
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}

  # JPA 설정
  jpa:
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        dialect: org.hibernate.dialect.DB2Dialect
        format_sql: true
        use_sql_comments: true
    show-sql: true

  # Jackson 설정
  jackson:
    serialization:
      write-dates-as-timestamps: false
    time-zone: Asia/Seoul

jwt:
  secret: ${JWT_SECRET:}
  access-token-expiration: 3600000
  refresh-token-expiration: 1209600000

---
# Development Profile
spring:
  config:
    activate:
      on-profile: dev

  datasource:
    url: ${DB_URL:jdbc:db2://192.168.0.70:25010/INTRA}
    username: ${DB_USERNAME:db2inst1}
    password: ${DB_PASSWORD:change-me}
    driver-class-name: com.ibm.db2.jcc.DB2Driver

# Jasypt 설정
jasypt:
  encryptor:
    password: ${JASYPT_ENCRYPTOR_PASSWORD:change-me}
    algorithm: PBEWithMD5AndDES
    iv-generator-classname: org.jasypt.iv.NoIvGenerator

# Logging
logging:
  level:
    kr.co.darumtech.intra: DEBUG
    org.springframework.security: DEBUG
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql.BasicBinder: TRACE

# Swagger 설정
springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: method

---
# Production Profile
spring:
  config:
    activate:
      on-profile: prod

  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: com.ibm.db2.jcc.DB2Driver

logging:
  level:
    kr.co.darumtech.intra: INFO
    org.springframework.security: WARN
