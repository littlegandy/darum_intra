services:
  db2:
    image: icr.io/db2_community/db2
    container_name: db2-intra
    privileged: true
    environment:
      LICENSE: accept
      DB2INST1_PASSWORD: db2inst1
      DBNAME: INTRA
    ports:
      - "25010:50000"
    volumes:
      - db2_data:/database
      - ./init/01_init_schema.sh:/var/custom/01_init_schema.sh
      - ./init/create_schema.sql:/tmp/init_schema.sql
    healthcheck:
      test: ["CMD-SHELL", "su - db2inst1 -c \"db2 connect to INTRA && db2 disconnect INTRA\""]
      interval: 30s
      timeout: 15s
      retries: 15
      start_period: 180s

volumes:
  db2_data:
